<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ashish - Visa Academy Bot</title>
  <style>
    body { font-family: Arial, sans-serif; }

    /* Floating button with animation */
    #chatButton {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: radial-gradient(circle at center, #f6a21f, #0b306e);
      color: white;
      border: none;
      border-radius: 50%;
      width: 70px;
      height: 70px;
      font-size: 30px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      animation: float 3s ease-in-out infinite, glow 4s ease-in-out infinite;
    }

    /* Floating up and down */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Glow pulse */
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 10px #f6a21f, 0 0 20px #0b306e; }
      50% { box-shadow: 0 0 20px #f6a21f, 0 0 40px #0b306e; }
    }

    /* Chat window */
    #chatWindow {
      position: fixed;
      bottom: 100px;
      right: 20px;
      width: 340px;
      height: 460px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    #chatHeader {
      background: #0b306e;
      color: #fff;
      padding: 12px;
      font-weight: bold;
      text-align: center;
    }

    #messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      background: #f9f9f9;
    }

    .msg { margin: 6px 0; padding: 8px 12px; border-radius: 12px; max-width: 80%; line-height: 1.4; }
    .user { background: #f6a21f; color: #000; margin-left: auto; }
    .bot { background: #e8edf5; color: #000; margin-right: auto; }

    #inputBox {
      display: flex;
      padding: 8px;
      border-top: 1px solid #ccc;
      background: #fff;
    }

    #input {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button.sendBtn {
      margin-left: 5px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #0b306e;
      color: #fff;
      cursor: pointer;
    }
    button.sendBtn:hover { background: #f6a21f; color:#0b306e; }
  </style>
</head>
<body>

  <!-- Floating Button -->
  <button id="chatButton">🌍</button>

  <!-- Chat Window -->
  <div id="chatWindow">
    <div id="chatHeader">Ashish - Visa Academy</div>
    <div id="messages">
      <div class="msg bot">👋 Hi, I’m Ashish! How can I help you today?</div>
    </div>
    <div id="inputBox">
      <input type="text" id="input" placeholder="Ask about visas..." />
      <button class="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const chatButton = document.getElementById("chatButton");
    const chatWindow = document.getElementById("chatWindow");

    chatButton.addEventListener("click", () => {
      chatWindow.style.display = chatWindow.style.display === "flex" ? "none" : "flex";
      chatWindow.style.flexDirection = "column";
    });

    async function sendMessage() {
      const inputField = document.getElementById("input");
      const message = inputField.value.trim();
      if (!message) return;

      const messagesDiv = document.getElementById("messages");

      // User message
      const userDiv = document.createElement("div");
      userDiv.className = "msg user";
      userDiv.textContent = message;
      messagesDiv.appendChild(userDiv);

      inputField.value = "";

      // Loading
      const loadingDiv = document.createElement("div");
      loadingDiv.className = "msg bot";
      loadingDiv.textContent = "Ashish is typing...";
      messagesDiv.appendChild(loadingDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      try {
        const res = await fetch("chatbot.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });

        const data = await res.json();
        loadingDiv.remove();

        const botDiv = document.createElement("div");
        botDiv.className = "msg bot";
        botDiv.textContent = data.reply;
        messagesDiv.appendChild(botDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      } catch (err) {
        loadingDiv.textContent = "⚠️ Error connecting to server.";
      }
    }
  </script>
</body>
</html>
