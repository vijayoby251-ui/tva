<!DOCTYPE html>
<html>
<head>
  <title>Admin Login - Send Agreement</title>
  <style>
    body { font-family: Arial; background: #f0e0d0; padding: 20px; }
    .login-container, .form-container {
      background: #fff; padding: 20px; border-radius: 10px;
      max-width: 400px; margin: auto; display: none;
    }
    .form-container { display: none; }
    input, button { width: 100%; padding: 10px; margin: 10px 0; }
  </style>
</head>
<body>
  <div class="login-container" id="loginBox">
    <h2>Admin Login</h2>
    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="checkLogin()">Login</button>
  </div>

  <div class="form-container" id="formBox">
    <h2>Send Agreement for Signature</h2>
    <form action="send_mail.php" method="POST" enctype="multipart/form-data">
      <label>Client Name:</label>
      <input type="text" name="client_name" required>
      <label>Client Email:</label>
      <input type="email" name="client_email" required>
      <label>Upload Agreement (PDF):</label>
      <input type="file" name="agreement" accept="application/pdf" required>
      <button type="submit">Send for Signature</button>
    </form>
  </div>

  <script>
    const USERNAME = "admin";
    const PASSWORD = "Visa2025@";

    document.getElementById("loginBox").style.display = "block";

    function checkLogin() {
      const u = document.getElementById("username").value;
      const p = document.getElementById("password").value;
      if (u === USERNAME && p === PASSWORD) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("formBox").style.display = "block";
      } else {
        alert("Invalid login!");
      }
    }
  </script>
</body>
</html>
